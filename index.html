<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Nasse Tiere</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .tier {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        img {
            width: 100%;
            max-width: 500px;
            border-radius: 8px;
            display: block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Nasse Tiere</h1>
    <p style="text-align:center;">Eine kleine Sammlung nasser Tiere.</p>

    <div class="tier">
        <h2>Nasse Katze</h2>
        <img src="images/IMG_1247.JPG" alt="Nasse Katze">
    </div>

    <div class="tier">
        <h2>Nasse Eule</h2>
        <img src="images/IMG_1244.JPG" alt="Nasse Eule">
    </div>

    <div class="tier">
        <h2>Nasser Hamster</h2>
        <img src="images/IMG_1245.WEBP" alt="Nasser Hamster">
    </div>

    <div class="tier">
        <h2>Nasser Bär</h2>
        <img src="images/IMG_1248.AVIF" alt="Nasser Bär">
    </div>

</body>
</html>
