<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Nasse Tiere</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .tier {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        img {
            width: 100%;
            max-width: 500px;
            border-radius: 8px;
            display: block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Nasse Tiere</h1>
    <p style="text-align:center;">Eine kleine Sammlung nasser Tiere.</p>

    <div class="tier">
        <h2>Nasser Hund</h2>
        <img src="https://images.unsplash.com/photo-1601758261939-edb1f4c456d4" alt="Nasser Hund">
    </div>

    <div class="tier">
        <h2>Nasse Katze</h2>
        <img src="https://images.unsplash.com/photo-1615195308896-527969b5cb27" alt="Nasse Katze">
    </div>

    <div class="tier">
        <h2>Nasse Ente</h2>
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="Nasse Ente">
    </div>

    <div class="tier">
        <h2>Nasser Vogel</h2>
        <img src="https://images.unsplash.com/photo-1646425888418-71b142c8cd18" alt="Nasser Vogel">
    </div>

</body>
</html>
